# ==================== Тяжёлый конфиг ====================
#
# БАЛАНС СРЕДЫ (v6): PPO для обоих + усиленные каскады
#
# Принцип: компании ПОХОЖИ индивидуально (узкие диапазоны фичей).
# MLP не может отличить хорошего заёмщика от плохого по фичам одной компании.
# Но каскады ОЧЕНЬ сильные — позиция в графе определяет, кто выживет.
# GNN видит слабых соседей → понимает каскадный риск → выигрывает.
#
# PPO для обоих агентов: честное сравнение, GNN ~150 fps → ~20 мин.

# --- Параметры среды ---
num_companies: 50
num_sectors: 5
num_steps: 600
interest_rate: 0.08

# --- Генерация графа ---
graph_type: "barabasi_albert"
ba_edges_per_node: 3
er_prob: 0.08
ws_k: 4
ws_p: 0.3

# --- Параметры компаний ---
# Нормальное распределение: mu=450, sigma=75, хвосты дают крупные/мелкие компании.
# Реалистичнее uniform — в реальности большинство компаний среднего размера.
assets_distribution: "normal"
assets_range: [300.0, 600.0]
burn_rate_range: [0.001, 0.004]
productivity_range: [1.01, 1.05]
liquidation_cost: 0.2

# --- Параметры кредитных заявок ---
# Крупные кредиты: одобрение сильно влияет на leverage
loan_amount_range: [50.0, 200.0]
loan_term_range: [3, 8]

# --- Параметры заражения ---
# Базовая контагия УМЕРЕННАЯ, но leverage amplifier ВЫСОКИЙ.
# Без кредитов экономика стабильна. Кредиты создают leverage →
# дефолт закредитованной компании бьёт по соседям в 5x сильнее.
# GNN видит: "у этого соседа bank_debt/assets = 0.8, если он рухнет — каскад".
contagion_fraction: 0.5
debt_amount_range: [15.0, 60.0]

# --- Механики влияния кредитов на граф ---
rejection_penalty: 0.04
loan_liability_passthrough: 0.7
contagion_leverage_amplifier: 5.0
default_cost: 50.0

# --- Cooldown ---
# После окончания эпизода ждём погашения всех кредитов (max 30 шагов).
# Это не даёт агенту расщедриться под конец, зная что дефолты не "дойдут".
cooldown_max_steps: 100

# --- Шоки (3 типа, независимые каждый шаг) ---
# Idiosyncratic: 1 компания. ~1 за 50 шагов = ~12 за эпизод
shock_probability: 0.02
shock_asset_loss: 0.3
# Sector: все компании сектора. ~1 за 200 шагов = ~3 за эпизод
sector_shock_probability: 0.005
sector_shock_asset_loss: 0.15
# Macro: все компании. ~1 за 600 шагов = ~1 за эпизод
macro_shock_probability: 0.0015
macro_shock_asset_loss: 0.08

# --- Рисковые секторы ---
# Сектор 4 (последний из 5) = рисковый: высокий burn, высокая productivity.
# ~20% компаний попадают в рисковый сектор (uniform distribution).
# CatBoost видит высокий burn_rate = high risk → отклоняет.
# RL может научиться: высокий burn + высокая productivity = выгодно если company healthy.
risky_sector_fraction: 0.2
risky_burn_rate_multiplier: 2.5
risky_productivity_multiplier: 1.5

# --- Тренировка RL ---
rl:
  algorithm: "PPO"
  total_timesteps: 300000
  learning_rate: 0.0003
  n_steps: 2048
  batch_size: 128
  gamma: 0.99
  gae_lambda: 0.95
  ent_coef: 0.02
  n_epochs: 10
  seed: 42

# --- GNN ---
gnn:
  hidden_dim: 64
  num_layers: 2
  conv_type: "GCN"
  dropout: 0.1

# --- CatBoost ---
# threshold 0.3: одобряем если P(default) < 30%.
# При 0.5 CatBoost слишком консервативен (среда агрессивная, base default rate высокий).
catboost:
  iterations: 500
  learning_rate: 0.05
  depth: 6
  approval_threshold: 0.3
