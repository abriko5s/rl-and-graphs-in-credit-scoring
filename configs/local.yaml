# ==================== Локальный конфиг для MacBook ====================
#
# Цель: полный прогон всех экспериментов (H1 + H2 + H3) за ~30-40 минут на CPU.
#
# Ключевые отличия от heavy.yaml:
#   - 20 компаний вместо 50 (среда в 2.5x быстрее)
#   - 200 шагов вместо 600 (эпизод в 3x короче)
#   - 50k timesteps вместо 200k (тренировка в 4x быстрее)
#   - n_steps: 512 (чаще обновления → быстрее сходимость на коротких эпизодах)
#   - CatBoost: 200 итераций
#   - Cooldown: 30 шагов
#
# Итого одна тренировка RL ~1-2 мин на M-чипе.
# H1 topologies: 6 агентов × 3 топологии = 18 тренировок → ~25 мин
# H2 + H3: ещё ~5-10 мин
# Evaluation: ~5 мин (по 10 эпизодов)

# --- Параметры среды ---
num_companies: 20
num_sectors: 5
num_steps: 200
interest_rate: 0.08

# --- Генерация графа ---
graph_type: "barabasi_albert"
ba_edges_per_node: 3
er_prob: 0.08
ws_k: 4
ws_p: 0.3

# --- Параметры компаний ---
assets_distribution: "normal"
assets_range: [300.0, 600.0]
burn_rate_range: [0.001, 0.004]
productivity_range: [1.01, 1.05]
liquidation_cost: 0.2

# --- Параметры кредитных заявок ---
loan_amount_range: [50.0, 200.0]
loan_term_range: [3, 8]

# --- Параметры заражения ---
contagion_fraction: 0.5
debt_amount_range: [15.0, 60.0]

# --- Механики влияния кредитов на граф ---
rejection_penalty: 0.04
loan_liability_passthrough: 0.7
contagion_leverage_amplifier: 5.0
default_cost: 50.0

# --- Cooldown ---
cooldown_max_steps: 30

# --- Шоки (3 типа) ---
# Частоты выше чем в heavy: эпизод короче, шоков нужно столько же в пропорции
shock_probability: 0.03
shock_asset_loss: 0.3
sector_shock_probability: 0.008
sector_shock_asset_loss: 0.15
macro_shock_probability: 0.003
macro_shock_asset_loss: 0.08

# --- Рисковые секторы ---
risky_sector_fraction: 0.2
risky_burn_rate_multiplier: 2.5
risky_productivity_multiplier: 1.5

# --- Тренировка RL ---
rl:
  algorithm: "PPO"
  total_timesteps: 30000
  learning_rate: 0.0003
  n_steps: 512
  batch_size: 64
  gamma: 0.99
  gae_lambda: 0.95
  ent_coef: 0.02
  n_epochs: 10
  seed: 42

# --- GNN ---
gnn:
  hidden_dim: 64
  num_layers: 2
  conv_type: "GCN"
  dropout: 0.1

# --- CatBoost ---
catboost:
  iterations: 200
  learning_rate: 0.05
  depth: 6
  approval_threshold: 0.3
